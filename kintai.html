<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勤怠入力システム（GitHub保存版）</title>

<style>
/* ===== 全体 ===== */
body {
    font-family: "Segoe UI", sans-serif;
    background: #f0f6ff;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #1a4fb7;
    margin-bottom: 20px;
}

/* ===== 入力行 ===== */
.row {
    margin: 10px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

label {
    width: 120px;
    font-weight: bold;
    color: #1a4fb7;
}

input, select {
    padding: 6px 10px;
    border: 1px solid #1a4fb7;
    border-radius: 4px;
    background: white;
}

/* ===== ボタン ===== */
button {
    background: #1a4fb7;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 10px;
}

button:hover {
    background: #163f92;
}

/* ===== タブ ===== */
.tabs {
    display: flex;
    margin-top: 10px;
}

.tab {
    padding: 8px 14px;
    border: 1px solid #1a4fb7;
    cursor: pointer;
    background: #e3ecff;
    border-radius: 4px 4px 0 0;
    margin-right: 4px;
}

.tab.active {
    background: #1a4fb7;
    color: white;
}

/* ===== テーブル ===== */
table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
    background: white;
}

th {
    background: #1a4fb7;
    color: white;
    padding: 8px;
    border: 1px solid #1a4fb7;
}

td {
    padding: 8px;
    border: 1px solid #1a4fb7;
}

/* ===== 管理者画面 ===== */
#adminTableArea {
    margin-top: 20px;
}

</style>
</head>

<body>

<h1>勤怠入力システム（GitHub保存版）</h1>

<!-- ここから PART2, PART3, PART4 が続く -->
<!-- ============================
  PART 2 : 入力画面（処理月対応）
  ============================ -->

<div id="input-screen">
  <h2>入力画面</h2>

  <div class="row">
    <label>処理月（YYYY-MM）</label>
    <input id="procMonth" type="month">
  </div>

  <div class="row">
    <label>チーム</label>
    <select id="team">
      <option value="1T">1T</option>
      <option value="2T">2T</option>
      <option value="3T">3T</option>
      <option value="4T">4T</option>
      <option value="営業">営業</option>
      <option value="企画推進">企画推進</option>
    </select>
  </div>

  <div class="row">
    <label>氏名</label>
    <input id="name" type="text">
  </div>

  <div class="row">
    <label>パスワード</label>
    <input id="password" type="password">
  </div>

  <hr>

  <div class="tabs">
    <div id="tab-single" class="tab active" onclick="switchTab('single')">個別入力</div>
    <div id="tab-range" class="tab" onclick="switchTab('range')">範囲入力</div>
  </div>

  <div id="content-single" class="tab-content">
    <div class="row">
      <label>日付</label>
      <input id="addDate" type="date">
    </div>

    <div class="row">
      <label>区分</label>
      <select id="addKubun">
        <option value="行先変更">行先変更</option>
        <option value="出張">出張</option>
      </select>
    </div>

    <div class="row">
      <label>適用</label>
      <input id="addTekiyo" type="text">
    </div>

    <button onclick="addRecord()">追加</button>
  </div>

  <div id="content-range" class="tab-content" style="display:none;">
    <div class="row">
      <label>期間</label>
      <input id="rangeFrom" type="date"> 〜
      <input id="rangeTo" type="date">
    </div>

    <div class="row">
      <label>区分</label>
      <select id="rangeKubun">
        <option value="行先変更">行先変更</option>
        <option value="出張">出張</option>
      </select>
    </div>

    <div class="row">
      <label>適用</label>
      <input id="rangeTekiyo" type="text">
    </div>

    <button onclick="addRange()">期間を一括追加</button>
  </div>

  <hr>

  <table id="inputTable">
    <thead>
      <tr>
        <th>日付</th>
        <th>区分</th>
        <th>適用</th>
        <th>削除</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr>

  <button onclick="saveData()">保存（GitHub）</button>
  <button onclick="goReference()">参照</button>
</div>
<!-- ============================
  PART 3 : 参照画面
  ============================ -->

<div id="reference-screen" style="display:none;">
  <h2>参照画面</h2>

  <div class="row">
    <label>処理月</label>
    <input id="refMonth" type="month">
  </div>

  <div class="row">
    <label>チーム</label>
    <input id="refTeam" type="text" readonly class="readonly">
  </div>

  <div class="row">
    <label>氏名</label>
    <input id="refName" type="text" readonly class="readonly">
  </div>

  <div class="row">
    <label>パスワード</label>
    <input id="refPassword" type="password" readonly class="readonly">
  </div>

  <button onclick="loadData()">データ読込（GitHub）</button>

  <table id="refTable">
    <thead>
      <tr>
        <th>日付</th>
        <th>区分</th>
        <th>適用</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<!-- ============================
  PART 4 : 管理者画面
  ============================ -->

<div id="admin-screen" style="display:none;">
  <h2>管理者ビュー</h2>

  <div class="row">
    <label>処理月</label>
    <input id="adminMonth" type="month">
  </div>

  <div class="row" id="adminTeamRow">
    <label>チーム選択</label>
    <select id="adminTeam">
      <option value="1T">1T</option>
      <option value="2T">2T</option>
      <option value="3T">3T</option>
      <option value="4T">4T</option>
      <option value="営業">営業</option>
      <option value="企画推進">企画推進</option>
    </select>
  </div>

  <button onclick="loadAdmin()">一覧生成（GitHub）</button>

  <div id="adminTableArea"></div>
</div>
<script>

/* ------------------------------------
   ★ Worker の URL（あなたの環境に合わせて変更）
------------------------------------ */
const WORKER_URL = "https://patient-violet-af9d.k-exe-kita.workers.dev";

/* ------------------------------------
   ★ 入力画面の一時保存用配列
------------------------------------ */
let tempRecords = [];

/* ------------------------------------
   ★ タブ切替
------------------------------------ */
function switchTab(mode) {
  document.getElementById('tab-single').classList.remove('active');
  document.getElementById('tab-range').classList.remove('active');
  document.getElementById('content-single').style.display = 'none';
  document.getElementById('content-range').style.display = 'none';

  if (mode === 'single') {
    document.getElementById('tab-single').classList.add('active');
    document.getElementById('content-single').style.display = 'block';
  } else {
    document.getElementById('tab-range').classList.add('active');
    document.getElementById('content-range').style.display = 'block';
  }
}

/* ------------------------------------
   ★ 個別追加
------------------------------------ */
function addRecord() {
  const month = document.getElementById('procMonth').value;
  const date = document.getElementById('addDate').value;

  if (!month) return alert("処理月を選択してください");
  if (!date.startsWith(month)) return alert("処理月と日付が一致していません");

  const kubun = document.getElementById('addKubun').value;
  const tekiyo = document.getElementById('addTekiyo').value;

  tempRecords.push({ date, kubun, tekiyo });
  renderInputTable();
}

/* ------------------------------------
   ★ 範囲追加
------------------------------------ */
function addRange() {
  const month = document.getElementById('procMonth').value;
  const from = document.getElementById('rangeFrom').value;
  const to = document.getElementById('rangeTo').value;

  if (!month) return alert("処理月を選択してください");
  if (!from.startsWith(month) || !to.startsWith(month))
    return alert("処理月と期間が一致していません");

  const kubun = document.getElementById('rangeKubun').value;
  const tekiyo = document.getElementById('rangeTekiyo').value;

  const start = new Date(from);
  const end = new Date(to);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const yyyy = d.getFullYear();
    const mm = ('0' + (d.getMonth() + 1)).slice(-2);
    const dd = ('0' + d.getDate()).slice(-2);
    tempRecords.push({
      date: `${yyyy}-${mm}-${dd}`,
      kubun,
      tekiyo
    });
  }

  renderInputTable();
}

/* ------------------------------------
   ★ 入力テーブル描画
------------------------------------ */
function renderInputTable() {
  const tbody = document.querySelector('#inputTable tbody');
  tbody.innerHTML = '';

  tempRecords.forEach((rec, index) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${rec.date}</td>
      <td>${rec.kubun}</td>
      <td>${rec.tekiyo}</td>
      <td><button onclick="deleteRecord(${index})">削除</button></td>
    `;
    tbody.appendChild(tr);
  });
}

/* ------------------------------------
   ★ 行削除
------------------------------------ */
function deleteRecord(index) {
  tempRecords.splice(index, 1);
  renderInputTable();
}

/* ------------------------------------
   ★ 保存（Worker 経由）
------------------------------------ */
async function saveData() {
  const month = document.getElementById('procMonth').value;
  const team = document.getElementById('team').value;
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!month) return alert("処理月を選択してください");
  if (!name) return alert("氏名を入力してください");
  if (!password) return alert("パスワードを入力してください");

  const payload = {
    project: "kintai",
    type: "save",
    date: month + "-01",
    team,
    name,
    password,
    month,
    records: tempRecords
  };

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const text = await res.text();

  if (!res.ok) {
    alert("保存失敗: " + text);
    return;
  }

  alert("GitHub に保存しました");

  // 参照画面へ値を引き継ぎ
  document.getElementById('refTeam').value = team;
  document.getElementById('refName').value = name;
  document.getElementById('refPassword').value = password;
  document.getElementById('refMonth').value = month;
}

/* ------------------------------------
   ★ 参照画面へ移動
------------------------------------ */
function goReference() {
  const month = document.getElementById('procMonth').value;
  const team = document.getElementById('team').value;
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!month) return alert("処理月を選択してください");
  if (!name) return alert("氏名を入力してください");
  if (!password) return alert("パスワードを入力してください");

  document.getElementById('refTeam').value = team;
  document.getElementById('refName').value = name;
  document.getElementById('refPassword').value = password;
  document.getElementById('refMonth').value = month;

  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('reference-screen').style.display = 'block';

  loadData();
}

/* ------------------------------------
   ★ 参照画面：データ読込（Worker 経由）
------------------------------------ */
async function loadData() {
  const month = document.getElementById('refMonth').value;
  const team = document.getElementById('refTeam').value;
  const name = document.getElementById('refName').value.trim();
  const password = document.getElementById('refPassword').value.trim();

  const payload = {
    project: "kintai",
    type: "load",
    month,
    team,
    name,
    password
  };

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const text = await res.text();

  if (!res.ok) {
    alert("データなし: " + text);
    return;
  }

  const data = JSON.parse(text);

  const tbody = document.querySelector('#refTable tbody');
  tbody.innerHTML = '';

  data.records.forEach(rec => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${rec.date}</td><td>${rec.kubun}</td><td>${rec.tekiyo}</td>`;
    tbody.appendChild(tr);
  });
}

/* ------------------------------------
   ★ 管理者ビュー（Worker 経由）
------------------------------------ */
async function loadAdmin() {
  const month = document.getElementById('adminMonth').value;
  const selectedTeam = document.getElementById('adminTeam').value;

  if (!month) return alert("処理月を選択してください");

  const payload = {
    project: "kintai",
    type: "admin",
    month,
    team: selectedTeam
  };

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const text = await res.text();

  if (!res.ok) {
    document.getElementById('adminTableArea').innerHTML = "データなし";
    return;
  }

  const all = JSON.parse(text);

  // 日付一覧
  const dates = new Set();
  all.forEach(user => {
    user.records.forEach(r => dates.add(r.date));
  });
  const sortedDates = [...dates].sort();

  let html = '<table><thead><tr><th>氏名_パスワード</th>';
  sortedDates.forEach(d => html += `<th>${d}</th>`);
  html += '</tr></thead><tbody>';

  all.forEach(user => {
    const rowKey = `${user.name}_${user.password}`;
    html += `<tr><td>${rowKey}</td>`;

    sortedDates.forEach(d => {
      const rec = user.records.find(r => r.date === d);
      if (rec) {
        const text = `${rec.kubun}_${rec.tekiyo}`;
        html += `<td title="${text}">${text}</td>`;
      } else {
        html += `<td></td>`;
      }
    });

    html += '</tr>';
  });

  html += '</tbody></table>';

  document.getElementById('adminTableArea').innerHTML = html;
}

</script>
